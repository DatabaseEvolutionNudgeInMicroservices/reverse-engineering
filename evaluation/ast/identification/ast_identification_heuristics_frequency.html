<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heuristics Frequencies</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>

<div id="plot0" style="width:50%;display:block;"></div>
<div id="plot1" style="width:50%;display:block;"></div>
<div id="plot2" style="width:50%;display:block;"></div>

<script>
    const plotNumber = 3;

    const xValues = [
        ['E0', 'E1', 'E2', 'E3', 'E4', 'E5', 'E6', 'E7', 'E8'],
        ['M0', 'M1', 'M2', 'M3', 'M4', 'M5', 'M6'],
        ['R0', 'R1', 'R2', 'R3', 'R4', 'R5', 'R6']
    ];

    const yLabels = [
        'javascript-api-express',
        'javascript-db-mongo',
        'javascript-db-redis'
    ];

    const zValues = [
        [82.26, 99.62, 99.62, 98.11, 97.74, 97.36, 64.91, 63.02, 63.02],
        [47.01, 99.63, 64.55, 97.76, 79.10, 11.19, 5.60],
        [4.41, 99.26, 21.32, 64.71, 79.41, 76.47, 41.91]
    ];

    const colorscales = [
        [[0, '#ffffff'], [1, '#f6e248']],
        [[0, '#ffffff'], [1, '#54a850']],
        [[0, '#ffffff'], [1, '#f74d3e']]
    ];

    for (let i = 0; i < plotNumber; i++) {
        const data = [{
            x: xValues[i],
            y: [yLabels[i]],
            z: [zValues[i]],
            type: 'heatmap',
            zmin: 0,
            zmax: 100,
            colorscale: colorscales[i],
            showscale: true,
            colorbar: {
                title: {
                    text: '%'
                }
            }
        }];

        const layout = {
            title: 'Heuristics Frequencies',
            height: 200,
            margin: {
                l: 180,
                r: 20,
                t: 40,
                b: 40
            },
            xaxis: {
                showgrid: false,
                automargin: true
            },
            yaxis: {
                showgrid: false,
                automargin: true,
                fixedrange: true
            },
            annotations: []
        };

        for (let k = 0; k < xValues[i].length; k++) {
            layout.annotations.push({
                x: xValues[i][k],
                y: yLabels[i],
                text: zValues[i][k].toFixed(2),
                showarrow: false,
                font: {
                    color: 'black',
                    size: 12
                }
            });
        }

        Plotly.newPlot('plot' + i, data, layout);
    }
</script>
</body>
</html>
